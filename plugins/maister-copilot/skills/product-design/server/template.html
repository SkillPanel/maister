<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Product Design</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    #status {
      font-size: 0.8rem;
      color: #4a4;
      font-weight: 500;
    }
    #status.disconnected { color: #a44; }
    main {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 1.5rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      min-height: 300px;
      position: relative;
    }
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: #999;
      font-size: 1rem;
      text-align: center;
      line-height: 1.8;
    }
    .annotation-tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 3px;
      pointer-events: none;
      max-width: 250px;
      z-index: 1000;
      line-height: 1.3;
    }
    .annotation-tooltip::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 10px;
      width: 8px;
      height: 8px;
      background: rgba(0, 0, 0, 0.75);
      transform: rotate(45deg);
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <span id="status">Connected</span>
  </header>

  <main id="mockup-container">
    {{CONTENT}}
  </main>

  <script>
    // SSE client for live refresh
    const statusEl = document.getElementById('status');
    const evtSource = new EventSource('/events');

    evtSource.onmessage = function(e) {
      if (e.data === 'refresh') location.reload();
    };

    evtSource.onopen = function() {
      statusEl.textContent = 'Connected';
      statusEl.className = '';
    };

    evtSource.onerror = function() {
      statusEl.textContent = 'Reconnecting...';
      statusEl.className = 'disconnected';
    };

    // Annotation overlay rendering
    const annotations = {{ANNOTATIONS}};

    function renderAnnotations() {
      const container = document.getElementById('mockup-container');
      annotations.forEach(function(ann) {
        if (!ann.selector) return;
        const target = container.querySelector(ann.selector);
        if (!target) return;

        const text = ann.note || ann.text || '';
        if (!text) return;

        const rect = target.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        const tooltip = document.createElement('div');
        tooltip.className = 'annotation-tooltip';
        tooltip.textContent = text;
        tooltip.style.top = (rect.bottom - containerRect.top + 6) + 'px';
        tooltip.style.left = (rect.left - containerRect.left) + 'px';
        container.appendChild(tooltip);
      });
    }

    if (annotations.length > 0) {
      // Wait for any mockup content to render before positioning
      requestAnimationFrame(renderAnnotations);
    }
  </script>
</body>
</html>
